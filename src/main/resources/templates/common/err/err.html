<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Insert title here</title>
<th:block th:replace="~{fragments/cdn :: cdn}" />
<style type="text/css">
#wrap {
	margin: 0px auto;
	width: 1000px;
	height: 1200px;
}

#header {
	height: 150px;
}

#container {
	height: 950px;
}

#footer {
	height: 100px;
}
</style>
<script type="text/javascript">
	$(function() {
	}); // ready
</script>
</head>
<body>
	<div id="wrap">
		<div id="header">
			<!--   <th:block th:replace="~{fragments/mainHeader :: header}" /> -->
			<th:block th:replace="~{fragments/MyHeader :: header}"></th:block>
		</div>
		<div id="container">
			<div class="error-container"
				style="text-align: center; padding: 50px;">
				<i class="bi bi-exclamation-octagon"
					style="font-size: 3rem; color: #dc3545;"></i>

				<h2 class="mt-4" th:text="${msg}">에러 메시지</h2>

				<p class="text-muted">해당 콘텐츠에 접근할 권한이 없거나 잘못된 요청입니다.</p>

				<div class="mt-5">
					<a href="javascript:history.back();" class="btn btn-dark">이전
						페이지로</a> <a href="/main" class="btn btn-outline-secondary">홈으로 이동</a>
				</div>

				<p style="margin-top: 100px; font-size: 11px; color: #ccc;">
					고객센터 문의 시 에러코드(<span th:text="${#strings.substring(msg, 1, 3)}"></span>)를
					함께 말씀해주세요.
				</p>
			</div>
		</div>
		<div id="footer">
			<th:block th:replace="~{fragments/footer :: footer}" />
		</div>
	</div>
</body>
</html>
