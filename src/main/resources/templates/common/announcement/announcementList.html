<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 다이얼로그 용 라이브러리 -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>
<script type="text/javascript">
$(function() {
	
	$("#btnSearch").click(function() {
		searchReview();
	}); // click
	
	$("#keyword").keyup(function(evt) {
		if(evt.which == 13) {
			searchReview();
		} // end if
	}); // keyup
}); // ready

function searchReview() {
	if($("#keyword").val().trim() != null) {
		$("#announcementSearchFrm").submit();
	} // end if
} // searchReview
</script>
<head>
    <meta charset="UTF-8">
    <title>공지사항</title>
    <link rel="stylesheet" href="/common/css/common-sidebar.css">
    <link rel="stylesheet" href="/common/announcement/announcement.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div th:replace="~{fragments/CommonHeader :: header}"></div>

    <div class="common-container">
        <div th:replace="~{fragments/CommonSidebar :: commonSidebar}"></div>

        <div class="common-content">
            		<!-- 옵션 선택바 -->
	        <div class="announcement-toolbar" style = "display: flex;">
	          <!--
	          <form th:action = "@{/admin/announcement/announcementList}" id = "announcementSearchFrm">
	          -->
	          <form th:action = "@{{url}(url = '/common/announcement/announcementList', field = ${param.lectId}, keyword = ${param.keyword}, currentPage = ${param.currentPage})}" id = "announcementSearchFrm">
	          <div class="announcement-filter">
	          	<select name = "field" id = "field">
				<option value = "1" th:selected = "${param.field ne null and param.field[0] eq '1'}">제목</option>
				<option value = "2" th:selected = "${param.field ne null and param.field[0] eq '2'}">내용</option>
				</select>
				<input type = "text" name = "keyword" id = "keyword" th:value = "${param.keyword != null ? param.keyword : ''}" style = "width: 650px; height: 36px;"/>
				<input type = "hidden" name = "currentPage" id = "currentPage" th:value = "${param.currentPage == null ? 1 : param.currentPage}"/>
				<input type = "text" style = "display: none"/>
				<input type = "button" value = "검색" id = "btnSearch" class = "btn btn--primary"/>
			  </div>
	          </form>
	        </div>
			<div class = "announcement-table-wrap">
				<table class = "announcement-table">
				<thead>
				<tr>
					<th style = "width: 80px">번호</th>
					<th style = "width: 450px">제목</th>
					<th style = "width: 80px">조회수</th>
					<th style = "width: 200px">작성일</th>
				</tr>
				</thead>
				<tbody>
				<th:block th:if = "${announcementList.empty}"  class="empty-state">
				<tr>
					<td colspan = "4" style = "text-align: center;">게시글이 없습니다.</td>
				</tr>
				</th:block>
				<tr class="announcement-row" th:each = "announcementDomain, i : ${announcementList}" th:object = "${announcementDomain}">
					<td th:text = "${listNum - i.index}">번호</td>
					<td class="announcement-title"><a th:href = "@{{url}(url = '/common/announcement/announcementDetail', annId = *{ann_id}, currentPage = ${param.currentPage})}"><span th:text = "*{title}">제목</span></a></td>
					<td th:text = "*{views}">조회수</td>
					<td th:text = "*{#dates.format(regdate, 'yyyy-MM-dd EEEE')}">작성일</td>
				</tr>
				</tbody>
				</table>
				<div id = "pagination" style = "text-align: center; display: center;">
					<div th:utext = "${pagination}"></div>
				</div>
			</div>
			
        </div>
    </div>
</body>
</html>
