<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>관리자 대시보드</title>
<th:block th:replace = "~{fragments/cdn :: cdn}"/>
<link rel="stylesheet" th:href="@{/admin/dashboard/dashboard.css}" />
<link rel="stylesheet" th:href="@{/admin/announcement/announcement.css}" />
<style type = "text/css">
a{color: #000000; text-decoration: none;}
a:hover{color: #808080; text-decoration: none;}

/* 게시판 pagination 디자인 */
.prevMark{color: #FF0000;}
.nextMark{color: #FF0000;}
.currentPage{font-size: 20px; font-weight: bold;}
.notCurrentPage{font-size: 18px; font-weight: normal;}
</style>
<!-- summernote 시작 -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-lite.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-lite.min.js"></script>

<script type="text/javascript">
$(function() {
	$("#btnWrite").click(function() {
	// 제목과 내용에 값이 있는지 유효성 검증
	if($("#title").val().trim() == "") {
		alert("제목은 필수 입력입니다.");
		$("#title").focus();
		return;
	} // end if
	
	if($("#content").val() == "" || $("#content").val() == "<p></p>") {
		alert("내용은 필수 입력입니다.");
		return;
	} // end if
	
	$("#frm").submit();
	}); // click
}); // ready
</script>
<script type="text/javascript">
$(function() {
      $('#content').summernote({
        placeholder: '공지사항을 작성해주세요.',
        tabsize: 2,
        height: 300,
        width: 500,
        toolbar: [
			// [groupName, [list of button]]
			['style', ['bold', 'italic', 'underline', 'clear']],
			['font', ['strikethrough', 'superscript', 'subscript']],
			['fontsize', ['fontsize']],
			['color', ['color']],
			['para', ['ul', 'ol', 'paragraph']],
			['height', ['height']],
			['insert', ['link', 'picture']]
		]
      });
}); // ready
</script>
</head>
<body class="admin-dashboard">
  <div id="header">
    <th:block th:replace="~{fragments/adminHeader :: adminHeader}"></th:block>
  </div>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <th:block th:replace="~{fragments/adminSidebar :: adminSidebar}"></th:block>
    </aside>

	<!-- 좌측 상단 제목 -->
    <main class="admin-content">
      <section class="announcement-page">
        <header class="announcement-header">
          <h1>공지사항 작성</h1>
        </header>

		<form th:action = "@{/admin/announcement/announcementWriteFrmProcess}" method = "post" name = "frm" id = "frm">
		<table>
		<tr>
			<td style = "width: 100px">제목</td>
			<td><input type = "text" name = "title" id = "title" style = "width: 500px"/></td>
		</tr>
		<tr>
			<td>내용</td>
			<td><textarea name = "content" id = "content"></textarea></td>
		</tr>
		<tr>
			<td></td>
			<td style = "text-align: center;">
				<button onclick = "return false" class = "btn btn-success"  id = "btnWrite">글쓰기</button>
				<a th:href = "@{{url}(url = '/admin/announcement/announcementList', currentPage = ${param.currentPage})}" class = "btn btn-info">리스트</a>
			</td>
			<td></td>
		</tr>
		<tr>
			<td></td>
			<td></td>
		</tr>
		</table>
		</form>
      </section>
      
    </main>
  </div>
</body>
</html>
