<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>관리자 - 공지사항 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" th:href="@{/instructor/dashboard/dashboard.css}" />
<link rel="stylesheet" th:href="@{/instructor/review/review.css}" />
<!-- 다이얼로그 용 라이브러리 -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>
<script type="text/javascript" th:inline="javascript">
$(function() {
	$("#btnSearch").click(function() {
		searchReview();
	}); // click
	
	$("#keyword").keyup(function(evt) {
		if(evt.which == 13) {
			searchReview();
		} // end if
	}); // keyup
	
	// 1. jQuery UI 다이얼로그 초기화
    $("#reviewDetailModal").dialog({
        autoOpen: false,
        modal: true,
        width: 500,
        resizable: false
    });

    // 2. 상세보기 버튼 클릭 (AJAX 통신)
    $(".btn-detail").click(function() {
        let reviewId = $(this).data("reviewid"); // 버튼에 숨긴 review_id 가져오기

        $.ajax({
            url: "/instructor/review/reviewDetailAjax",
            type: "GET",
            data: { reviewId: reviewId },
            dataType: "json",
            success: function(res) {
                // 모달에 값 채우기
                $("#modal-id").text(res.user_id);
                $("#modal-lecture").text(res.lecture_name);
                $("#modal-score").text(res.score + "/5");
                
                // 날짜 포맷 변환 (밀리초 -> yyyy-mm-dd)
                let date = new Date(res.regdate);
                let formattedDate = date.getFullYear() + "-" + 
                    ("0" + (date.getMonth() + 1)).slice(-2) + "-" + 
                    ("0" + date.getDate()).slice(-2);
                $("#modal-date").text(formattedDate);
                
                $("#modal-ip").text(res.regip);
                $("#modal-content").text(res.content);

                // 모달 띄우기
                $("#reviewDetailModal").dialog("open");
            },
            error: function() {
                alert("리뷰 상세 정보를 불러오는데 실패했습니다.");
            }
        });
    });

}); // ready

function searchReview() {
	if($("#keyword").val().trim() != null) {
		$("#reviewSearchFrm").submit();
	} // end if
} // searchAnnouncement
</script>
</head>
<body class="instructor-dashboard">
  <div id="header">
    <th:block th:replace="~{fragments/instructorHeader :: instructorHeader}"></th:block>
  </div>

  <div class="instructor-layout">
    <aside class="instructor-sidebar">
      <th:block th:replace="~{fragments/instructorSidebar :: instructorSidebar}"></th:block>
    </aside>

	<!-- 좌측 상단 제목 -->
    <main class="instructor-content">
      <section class="review-page">
        <header class="review-header">
          <h1>리뷰 관리</h1>
        </header>

		<!-- 옵션 선택바 -->
        <div class="review-toolbar" style = "display: flex;">
          <form th:action = "@{{url}(url = '/instructor/review/reviewList', field = ${param.field}, keyword = ${param.keyword}, currentPage = ${param.currentPage})}" id = "reviewSearchFrm">
          <div class="review-filter">
          	<select name = "field" id = "field">
			<option value = "1" th:selected = "${param.field ne null and param.field[0] eq '1'}">강의</option>
			<option value = "2" th:selected = "${param.field ne null and param.field[0] eq '2'}">평점</option>
			<option value = "3" th:selected = "${param.field ne null and param.field[0] eq '3'}">내용</option>
			</select>
			<input type = "text" name = "keyword" id = "keyword" th:value = "${param.keyword != null ? param.keyword : ''}" style = "height: 30px"/>
			<input type = "hidden" name = "currentPage" id = "currentPage" th:value = "${param.currentPage == null ? 1 : param.currentPage}"/>
			<input type = "text" style = "display: none"/>
			<input type = "button" value = "검색" id = "btnSearch" class = "btn btn--primary"/>
		  </div>
          </form>
        </div>

		<!-- 테이블 내용 -->
		<table class = "review-table">
		<thead>
		<tr>
			<th style = "width: 150px">ID</th>
			<th style = "width: 150px">닉네임</th>
			<th style = "width: 200px">강의</th>
			<th style = "width: 80px">평점</th>
			<th style = "width: 250px">리뷰 내용</th>
			<th style = "width: 200px">작성일</th>
			<th style = "width: 80px"></th>
		</tr>
		</thead>
		<tbody>
		<th:block th:if = "${reviewList.empty}">
		<tr>
			<td colspan = "7" style = "text-align: center;">게시글이 없습니다.</td>
		</tr>
		</th:block>
		<tr class="review-row" th:each = "reviewDomain, i : ${reviewList}" th:object = "${reviewDomain}">
			<td th:text = "*{user_id}">ID</td>
			<td th:text = "*{user_name}">닉네임</td>
			<td th:text = "*{lecture_name}">강의</td>
			<td th:text = "|*{score}/5|">평점</td>
			<td th:text = "*{content}">리뷰 내용</td>
			<td th:text = "*{#dates.format(regdate, 'yyyy-MM-dd')}">작성일</td>
			<td>
			<input type = "hidden" th:value = "*{regip}"/>
			<input type = "button" class = "btn btn--primary btn-detail" value = "상세보기" th:data-reviewid="*{review_id}"/>
			</td>
		</tr>
		</tbody>
		</table>
		<div id = "pagination" style = "text-align: center; display: center;">
			<div th:utext = "${pagination}"></div>
		</div>
      </section>
    </main>
    <div id="reviewDetailModal" style="display: none;" title="리뷰 상세 조회">
    <table class="modal-detail-table">
        <tbody>
            <tr>
                <th>아이디</th>
                <td id="modal-id"></td>
            </tr>
            <tr>
                <th>강의</th>
                <td id="modal-lecture"></td>
            </tr>
            <tr>
                <th>평점</th>
                <td id="modal-score"></td>
            </tr>
            <tr>
                <th>작성일</th>
                <td id="modal-date"></td>
            </tr>
            <tr>
                <th>아이피</th>
                <td id="modal-ip"></td>
            </tr>
            <tr>
                <th>리뷰</th>
                <td>
                    <div id="modal-content" class="modal-scroll-content"></div>
                </td>
            </tr>
        </tbody>
    </table>
	</div>
  </div>
</body>
</html>
