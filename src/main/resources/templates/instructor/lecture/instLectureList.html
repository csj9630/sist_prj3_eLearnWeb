<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강사 - 강의 관리 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <th:block th:replace="~{fragments/cdn :: cdn}"></th:block>
    <!-- cdn 전부 -->
    <link rel="stylesheet" th:href="@{/instructor/dashboard/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/instructor/lecture/allLecture.css}" />
    <!-- 다이얼로그 용 라이브러리 -->
    <link
      rel="stylesheet"
      href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>

    <style>
      /* 강사 대시보드용 추가 스타일 */
      .search-filter-wrap {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .search-filter-wrap form {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .search-filter-wrap select,
      .search-filter-wrap input {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .status-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.85em;
        font-weight: bold;
      }
      /* 승인대기 */
      .bg-wait {
        background-color: #616565;
        color: #FFF;
      }
      /* 승인완료 */
      .bg-pass {
        background-color: #5568FA;
        color: #FFF;
      }
      /* 반려 */
      .bg-reject {
        background-color: #f8d7da;
        color: #721c24;
      }

      /* 공개중 */
      .bg-open {
        background-color: #5568FA;
        color: #FFF;
      }

      /* 비공개중 */
      .bg-close {
        background-color: #616565;
        color: white;
      }

      /* 수입 */
      .text-cash {
        color: #28a745;
        font-weight: bold;
      }
      /* 테이블 중앙 정렬 */
      .course-table th,
      .course-table td {
        text-align: center !important;
        vertical-align: middle !important;
      }
    </style>

    <script>
      function showRejectReason(reason) {
        if (!reason || reason.trim() === "") {
          alert("상세 반려 사유가 등록되지 않았습니다.");
        } else {
          // 간단하게 alert로 띄우거나, 팀원의 다이얼로그 로직을 활용하세요.
          alert("🚨 반려 사유\n--------------------------\n" + reason);
        }
      } //function

      function changeAvailability(lectId, currentStatus) {
        // 1이면 0으로, 0이면 1로 반전
        const nextStatus = currentStatus == 1 ? 0 : 1;
        const statusText = nextStatus == 1 ? "공개" : "비공개";

        if (!confirm(`강의를 ${statusText} 상태로 전환하시겠습니까?`)) return;

        $.ajax({
          url: "/instructor/lecture/updateAvailability",
          type: "POST",
          data: {
            lectId: lectId,
            availability: nextStatus,
          },
          success: function (response) {
            alert(statusText + " 상태로 변경되었습니다.");
            location.reload(); // 간단하게 페이지 새로고침으로 반영
          },
          error: function () {
            alert("상태 변경 중 오류가 발생했습니다.");
          },
        });
      } //function
    </script>
  </head>
  <body class="instructor-dashboard">
    <div id="header">
      <th:block
        th:replace="~{fragments/instructorHeader :: instructorHeader}"
      ></th:block>
    </div>

    <div class="instructor-layout">
      <aside class="instructor-sidebar">
        <th:block
          th:replace="~{fragments/instructorSidebar :: instructorSidebar}"
        ></th:block>
      </aside>

      <main class="instructor-main">
        <header class="main-header">
          <h1>나의 강의 관리</h1>
          <p th:text="|${session.instId}님께서 교육 중이신 강의의 승인 상태와 판매 현황을 확인할 수 있습니다.|" ></p>
          
        </header>

        <section class="search-filter-wrap">
          <form th:action="@{/instructor/lecture/list}" method="get">
            <select name="availability">
              <option value="">공개 여부(전체)</option>
              <option value="1" th:selected="${sDTO?.availability == '1'}">
                공개
              </option>

              <option value="0" th:selected="${sDTO?.availability == '0'}">
                비공개
              </option>
            </select>

            <select name="approval">
              <option value="">승인 상태(전체)</option>
              <option value="0" th:selected="${sDTO?.approval == '0'}">
                반려
              </option>
              <option value="1" th:selected="${sDTO?.approval == '1'}">
                승인완료
              </option>
              <option value="2" th:selected="${sDTO?.approval == '2'}">
                승인대기
              </option>
            </select>

            <input
              type="text"
              name="keyword"
              th:value="${sDTO?.keyword}"
              placeholder="강의명으로 검색..."
              style="flex-grow: 1"
            />

            <button type="submit" class="btn btn--primary">검색하기</button>
            <a th:href="@{/instructor/lecture/list}" class="btn btn--ghost"
              >초기화</a
            >
          </form>
        </section>

        <div class="dashboard-panel">
          <div>
            <a
              th:href="@{/instructor/lecture/manage}"
              class="btn btn-sm btn-success"
              style="font-size: 17px; padding: 5px 10px; border: 1px solid #ccc; float: left; padding: 20px; margin-right: 50px; margin-bottom:20px; " 
              >신규 강의 등록</a
            >
          </div>
          <table class="course-table text-center">
            <thead>
              <tr>
                <th>이미지</th>
                <th>강의명</th>
                <th>평점</th>
                <th>수강생</th>
                <th>총 수입</th>
                <th>상태</th>
                <th>공개</th>
                <th>관리</th>
                <th>강의 상세</th>
              
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(lectureList)}">
                <td colspan="7" style="text-align: center; padding: 50px 0">
                  조회된 강의가 없습니다.
                </td>
              </tr>

              <tr
                class="course-row"
                th:each="lect : ${lectureList}"
                th:object="${lect}"
              >
                <td class="course-thumb">
                  <img
                    th:src="|${imgPath}*{thumbnail}|"
                    alt="썸네일"
                    onerror="this.src = '/common/images/default.png'"
                  />
                </td>
                <td class="course-title">
                  <strong th:text="*{name}">강의명</strong><br />
                  <small class="text-muted" th:text="*{catName}"
                    >카테고리</small
                  >
                </td>
                <td>
                  <span th:text="'⭐ ' + *{reviewAvg}">⭐ 4.5</span>
                </td>
                <td th:text="|*{userCount}명|">120명</td>
                <td>
                  <span
                    class="text-cash"
                    th:text="|${#numbers.formatInteger(lect.cash, 0, 'COMMA')}원|"
                    >1,000,000원</span
                  >
                </td>
                <td>
                  <span
                    th:if="*{approval == 0}"
                    class="status-badge bg-reject"
                    th:onclick="showRejectReason([[${lect.rejectReason}]])"
                    style="cursor: pointer"
                    title="클릭하여 사유 확인"
                  >
                    반려</span
                  >
                  <span th:if="*{approval == 1}" class="status-badge bg-pass"
                    >승인</span
                  >
                  <span
                    th:if="*{approval != 1 and approval != 0 }"
                    class="status-badge bg-wait"
                    >대기</span
                  >
                </td>
                <td>
                  <span
                    th:if="*{availability == 1}"
                    class="status-badge bg-open"
                    >공개중</span
                  >

                  <span
                    th:unless="*{availability == 1}"
                    class="status-badge bg-close"
                    >비공개</span
                  >
                </td>
                <td class="course-actions">
                  <!--                   <a
                    th:href="@{/instructor/lecture/edit(lectId=*{lectId})}"
                    class="btn btn--ghost"
                    style="font-size: 12px; padding: 5px 10px"
                    >강의 수정</a
                  >
                      <br/> -->
                  <button
                    class="btn"
                    th:onclick="changeAvailability([[*{lectId}]], [[*{availability}]])"
                    style="font-size: 12px; padding: 5px 10px"
                    th:text="*{availability == 1} ? '비공개' : '공개'"
                    th:classappend="*{availability == 1} ? 'btn-danger' : 'btn--primary'"
                  >
                    공개 설정
                  </button>
                </td>
                <td class="course-actions">
                  <a
                    th:href="@{/instructor/lecture/detail(lectId=*{lectId})}"
                    class="btn btn--ghost"
                    style="
                      font-size: 12px;
                      padding: 5px 10px;
                      border: 1px solid #ccc;
                    "
                    >상세</a
                  >
                </td>
                
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
