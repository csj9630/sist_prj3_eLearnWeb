<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강의 상세 내역 - 강사 대시보드</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" th:href="@{/instructor/dashboard/dashboard.css}" />
<!--     <link rel="stylesheet" th:href="@{/instructor/lecture/notApprLecture.css}" /> -->
    <link rel="stylesheet" th:href="@{/instructor/lecture/instlectureDetail.css}" />
    
    <th:block th:replace="~{fragments/cdn :: cdn}"></th:block>
</head>

<body class="instructor-dashboard">

    <header class="header" style="position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #fff; border-bottom: 1px solid #ebe7e3; z-index: 1000; display: flex; align-items: center;">
        <th:block th:replace="~{fragments/instructorHeader :: instructorHeader}"></th:block>
    </header>

    <div class="instructor-layout">
        
        <aside class="instructor-sidebar" style="position: fixed; top: 50px; left: 0; width: 240px; height: calc(100vh - 50px); z-index: 999; overflow-y: auto;">
            <th:block th:replace="~{fragments/instructorSidebar :: instructorSidebar}"></th:block>
        </aside>

        <main class="instructor-main" id="wrap" style="margin-left: 240px; width: calc(100% - 240px); padding: 32px; background: #f6f4f1; min-height: 100vh;">
            <div class="course-page" th:object="${ldto}">
                
                <section class="course-header" style="background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; gap: 30px; margin-bottom: 40px;">
                    <div class="thumb-box" style="flex: 0 0 300px;">
                        <img  th:src="|${imgPath}*{thumbnail}|"

 							onerror="this.src = '/common/images/default.png'"
                             class="img-fluid shadow-sm" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px;">
                    </div>
                    <div class="info-box" style="flex: 1;">
                        <span class="badge bg-primary-soft mb-2" style="padding: 6px 12px; font-size: 0.85rem;" th:text="*{catName}">카테고리</span>
                        <h1 class="mb-3" th:text="*{name}" style="font-size: 1.8rem; font-weight: 700; color: #1f2328;">강의명</h1>
                        <p class="text-muted mb-4" th:text="*{shortint}" style="font-size: 1.1rem; color: #6e6a67;">강의 소개</p>
                        
                        <div class="d-flex gap-5">
                            <div>
                                <span style="font-size: 0.9rem; color: #888; display: block; margin-bottom: 4px;">수강료</span>
                                <span class="fw-bold fs-5" th:text="*{price == 0 ? '무료' : #numbers.formatInteger(price, 3, 'COMMA') + '원'}">0원</span>
                            </div>
                            <div>
                                <span style="font-size: 0.9rem; color: #888; display: block; margin-bottom: 4px;">총 강좌</span>
                                <span class="fw-bold fs-5" th:text="|${chapterList.size()}강좌|">0강</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="curriculum-list">
                    <h3 class="mb-4" style="font-size: 1.3rem; font-weight: 700; color: #1f2328;">커리큘럼 상세</h3>
                    <table class="table curriculum-table">
                        <thead>
                            <tr>
                                <th>강좌</th>
                                <th>강의 제목</th>
                                <th>강의 시간</th>
                                <th >강의 자료</th>
                                <th >영상</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ch : ${chapterList}">
                                <td th:text="|${ch.num}강|"></td>
                                <td th:text="${ch.name}" class="fw-bold" style="color: #333;"></td>
                                <td th:text="${ch.lengthStr}"></td>
                                <td>
                                    <span th:if="${ch.doc != null}" class="text-truncate d-inline-block" style="max-width: 150px;" th:text="${ch.doc}"></span>
                                    <span th:unless="${ch.doc != null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <a th:if="${ch.video != null}" th:href="@{'https://youtu.be/' + ${ch.video}}" target="_blank" class="btn btn-sm btn-outline-danger" style="padding: 4px 12px; font-weight: 600;">영상 보기</a>
                                    <span th:unless="${ch.video != null}" class="text-muted">-</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(chapterList)}">
                                <td colspan="5" class="text-center text-muted" style="padding: 50px;">등록된 커리큘럼 정보가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </section>

                <div class="action-buttons mt-5 d-flex align-items-center justify-content-end gap-2" style="border-top: 1px solid #ebe7e3; padding-top: 24px;">
                    <a th:href="@{/instructor/lecture/list}" class="btn btn-lg btn-light" style="padding: 10px 24px; font-weight: 600;">목록으로</a>
                    <a th:href="@{/instructor/lecture/edit(lectId=*{lectId})}" class="btn btn-lg btn-dark" style="padding: 10px 24px; font-weight: 600; background: #1f2328; color: #fff;">강의 수정</a>
                    <a th:href="@{/instructor/chapter/manage(lectId=*{lectId})}" class="btn btn-lg btn-success" style="padding: 10px 24px; font-weight: 600; background: #10B981; border: none;">챕터 관리</a>
                    
                    <form th:action="@{/instructor/lecture/test/instTestFrm}" method="POST" style="display:inline; margin: 0;">
                        <input type="hidden" name="lectId" th:value="*{lectId}">
                        <button type="submit" class="btn btn-primary btn-lg" style="padding: 10px 24px; font-weight: 600; background: #1f6feb; border: none;">
                            시험 관리
                        </button>
                    </form>
                </div>

            </div>
        </main>
        
    </div>

    <script>
        // 루시드 아이콘 렌더링 (CDN이 있을 경우)
        $(document).ready(function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
