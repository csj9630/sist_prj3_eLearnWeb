<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>강사 연습문제 관리</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style type="text/css">
    body { background-color: #f8faff; font-family: 'Pretendard', sans-serif; padding: 0px; }
    .manage-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; align-items: start; }
    
    /* 공통 카드 스타일 */
    .view-card { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 950px; position: relative; }
    .step-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; }
    .step1-badge { background-color: #e6fffa; color: #38b2ac; }
    .step2-badge { background-color: #ebf4ff; color: #4299e1; }
    .view-title { font-size: 1.4rem; font-weight: 800; color: #2d3748; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }

    /* 왼쪽: 문제 목록 스타일 */
    .empty-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; color: #a0aec0; text-align: center; }
    .empty-icon { font-size: 4rem; margin-bottom: 20px; }
    .table-container { max-height: 550px; overflow-y: auto; }
    .table thead th { background-color: #f7fafc; color: #718096; font-weight: 600; border-top: none; }
    .ajaxTestATeg { font-weight: bold; color: #4a5568 !important; }
    
    /* 오른쪽: 입력 폼 스타일 */
    .form-group { margin-bottom: 25px; }
    .form-label { font-weight: 700; color: #4a5568; margin-bottom: 10px; display: block; }
    .input-custom { width: 100%; border: 2px solid #edf2f7; border-radius: 12px; padding: 12px 18px; transition: all 0.3s; }
    .input-custom:focus { border-color: #4299e1; outline: none; box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1); }
    
    /* 보기 입력란 (A, B, C, D) */
    .option-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; background: #f8fafc; padding: 8px 15px; border-radius: 12px; border: 1px solid #edf2f7; }
    .option-label { font-weight: 800; color: #a0aec0; width: 20px; }
    .option-input { flex: 1; border: none; background: transparent; padding: 8px; font-weight: 500; }
    .option-input:focus { outline: none; }
    .radio-custom { width: 20px; height: 20px; cursor: pointer; accent-color: #4299e1; }

    /* 하단 버튼 영역 */
    .action-area { margin-top: 30px; }
    .btn-main { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; border: none; transition: transform 0.2s; }
    .btn-main:active { transform: scale(0.98); }
    #createTest { background-color: #2d3748; color: white; }
    #btnUpdate { background-color: #4299e1; color: white; }
    
    /* 개발용 필드 숨김/정리 */
    .dev-info { font-size: 11px; color: #cbd5e0; margin-top: 20px; border-top: 1px dashed #edf2f7; padding-top: 10px; }
    .dev-info input { border: none; background: transparent; color: #a0aec0; width: 50px; }

CSS
/* 하단 닫기 버튼 영역 */
.footer-close {
    position: fixed; /* 화면에 고정 */
    bottom: 30px;
    right: 40px;
    z-index: 1000;
}

.btn-close-custom {
    background-color: #6610f2; /* 보라색 테마 유지 */
    color: white;
    padding: 10px 35px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    font-size: 1.1rem;
    box-shadow: 0 4px 12px rgba(102, 16, 242, 0.3);
    transition: all 0.3s ease;
    cursor: pointer;
}

.btn-close-custom:hover {
    background-color: #520dc2;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(102, 16, 242, 0.4);
}#rightView {
    position: relative; /* 자식 요소인 버튼의 기준점이 됩니다. */
}

.step2-footer-close {
    position: absolute;
    bottom: 25px; /* 카드의 하단 여백 */
    right: 35px;  /* 카드의 우측 여백 */
}

.btn-close-custom {
    background-color: #6610f2;
    color: white;
    padding: 8px 25px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    font-size: 0.95rem;
    box-shadow: 0 4px 12px rgba(102, 16, 242, 0.2);
    transition: all 0.3s ease;
    cursor: pointer;
}

.btn-close-custom:hover {
    background-color: #520dc2;
    transform: translateY(-2px);
}

</style>

<script type="text/javascript">
    /* 기존 JavaScript 로직 유지 */
    $(function() {
        refreshTable();
        
        $(document).on("click", ".ajaxTestATeg", function() {
            var qid = $(this).data("qid");
            var num = $(this).data("num");
            searchOneTest(qid, num);
        });
    
        $("#createTest").click(function(){
            insertOneTest();
        });
        
        $(document).on("click", ".updateAjax", function() {
            var qid = $(this).data("qid");
            var num = $(this).data("num");
            searchOneTest(qid, num);
        });

        $(document).on("click", ".deleteAjax", function() {
            if (confirm("삭제하시겠습니까?")) {
                deleteOneTest($(this).data("num"));
            }
        });

        $(document).on("click", ".btnUpdate", function() {
            if (confirm("수정하시겠습니까?")) {
                updateTest($(this).data("num"));
            }
        });

        $(".btn-success").click(function() {
            var $rightForm = $("#rightForm");
            $rightForm[0].reset();
            $("#qid").val("");
            $("#createTest").show(); 
            $("#btnUpdate").hide(); 
            $("#btnCancel").hide();
        });
        
        $(function() {
            $("#btnPageClose").click(function(){
                
                if(confirm("문제 관리 페이지를 나가시겠습니까?")) {
                    location.href = "/instructor/dashboard";
                }
            });
        });
    });

    function drawTestTable(list, instId, lectId) {
        var html = "";
        if (!list || list.length === 0) {
            // 이미지의 'Step 2 제작된 문제 목록 (0)' 상태 구현
            $("#listCount").text("( 0 )");
            html = `
                <div class="empty-view">
                    <div class="empty-icon">📄</div>
                    <p><strong>등록된 문제가 없습니다.</strong><br>오른쪽에서 문제를 작성하고 추가해주세요.</p>
                </div>`;
            $("#testTableBody").parent().hide(); // 테이블 숨김
            $("#emptyContainer").html(html).show(); // 안내 문구 표시
            return;
        }

        $("#testTableBody").parent().show();
        $("#emptyContainer").hide();
        $("#listCount").text("( " + list.length + " )");

        $.each(list, function(idx, item) {
            html += '<tr>';
            html += '    <td style="width:15%">';
            html += '        <input type="hidden" class="h-instId" value="' + instId + '">';
            html += '        <input type="hidden" class="h-lectId" value="' + lectId + '">';
            html += '        <span class="ajaxTestATeg" data-qid="' + item.qid + '" data-num="' + item.num + '" ';
            html += '        style="cursor: pointer; text-decoration: underline;">' + item.num + '번</span>';
            html += '    </td>';
            html += '    <td style="width:55%">' + (item.content.length > 30 ? item.content.substring(0,30)+'...' : item.content) + '</td>';
            html += '    <td style="width:30%; text-align:right;">';
            html += '        <button class="btn btn-sm btn-outline-primary updateAjax" data-qid="' + item.qid + '" data-num="' + item.num + '">수정</button>';
            html += '        <button class="btn btn-sm btn-outline-danger deleteAjax" id="deleteTest-' + item.num + '" data-qid="' + item.qid + '" data-num="' + item.num + '">삭제</button>';
            html += '    </td>';
            html += '</tr>';
        });
        $("#testTableBody").html(html);
    }

    /* 나머지 AJAX 함수들 (searchOneTest, insertOneTest 등) 기존 코드 유지됨 */
    function searchOneTest(qid, num) {
        var instId = $("#instId").val();
        var lectId = $("#lectId").val();
        $.ajax({
            url : "/instructor/lecture/test/instTestOneFrm",
            dataType : "JSON",
            data : {"qid" : qid, "instId" : instId, "lectId" : lectId},
            success : function(jsonObj) {
                $("#question").val(jsonObj.data.content);
                $("#qid").val(jsonObj.data.qid);
                $("#opt1").val(jsonObj.data.opt1);
                $("#opt2").val(jsonObj.data.opt2);
                $("#opt3").val(jsonObj.data.opt3);
                $("#opt4").val(jsonObj.data.opt4);
                $("#exp").val(jsonObj.data.exp);
                $("input:radio[name='ans'][value='" + jsonObj.data.ans + "']").prop("checked", true);
                $("#createTest").hide();
                $("#btnUpdate, #btnCancel").show();
                
                $("#btnCancel").off("click").on("click", function() {
                    $("#rightForm")[0].reset();
                    $("#qid").val("");
                    $("#createTest").show();
                    $("#btnUpdate, #btnCancel").hide();
                });
            }
        });
    }

    function insertOneTest() {
    	if (!validateForm()) return;
    	
        var ajaxData = $("#rightForm").serialize();
        $.ajax({
            url : "/instructor/lecture/test/createTest",
            type : "POST",
            dataType : "JSON",
            data : ajaxData,
            success: function(jsonObj) {
                if (jsonObj.flag) {
                    alert("문제가 성공적으로 등록되었습니다.");
                    $("#rightForm")[0].reset();
                    refreshTable(); 
                }
            }
        });
    }

    function deleteOneTest(num) {
        var qid = $("#deleteTest-" + num).data("qid");
        $.ajax({
            url : "/instructor/lecture/test/removeTest",
            type : "POST",
            dataType : "JSON",
            data : {"qid" : qid, "instId" : $("#instId").val(), "lectId" : $("#lectId").val()},
            success : function() {
                alert("삭제되었습니다.");
                refreshTable();
            }
        });
    }

    function updateTest() {
    	if (!validateForm()) return;
        var ajaxData = {
            "qid" : $("#qid").val(),
            "instId" : $("#instId").val(),
            "lectId" : $("#lectId").val(),
            "content" : $("#question").val(),
            "opt1" : $("#opt1").val(),
            "opt2" : $("#opt2").val(),
            "opt3" : $("#opt3").val(),
            "opt4" : $("#opt4").val(),
            "ans" : $("input[name='ans']:checked").val(),
            "exp" : $("#exp").val()
        };
        $.ajax({
            url : "/instructor/lecture/test/modifyTest",
            type : "POST",
            dataType : "JSON",
            data : ajaxData,
            success : function() {
                alert("수정되었습니다.");
                refreshTable();
                $("#btnCancel").click();
            }
        });
    }

    function refreshTable() {
        $.ajax({
            url : "/instructor/lecture/test/instTestListJson",
            type : "POST",
            data : {"instId" : $("#instId").val(), "lectId" : $("#lectId").val()},
            dataType : "JSON",
            success : function(list) { drawTestTable(list, $("#instId").val(), $("#lectId").val()); }
        });
    }
    
    //유효성 검사
    function validateForm() {
        if ($("#question").val().trim() === "") {
            alert("질문 내용을 입력해주세요.");
            $("#question").focus();
            return false;
        }

        for (var i = 1; i <= 4; i++) {
            if ($("#opt" + i).val().trim() === "") {
                alert("보기 " + i + " 내용을 입력해주세요.");
                $("#opt" + i).focus();
                return false;
            }
        }

        if (!$("input[name='ans']:checked").val()) {
            alert("정답을 선택해주세요.");
            return false;
        }

        if ($("#exp").val().trim() === "") {
            alert("해설 내용을 입력해주세요.");
            $("#exp").focus();
            return false;
        }

        return true; // 모든 검사 통과
    }
</script>
</head>
<body>
<div th:replace="~{fragments/InstHeader :: header}"></div>
    <div class="manage-container" style="margin-top:30px;">
        <div id="leftView" class="view-card">
            <span class="step-badge step1-badge">Step 1</span>
            <div class="view-title">
                제작된 문제 목록 <span id="listCount" style="color: #4299e1;">( 0 )</span>
            </div>
            
            <div id="emptyContainer"></div>

            <div class="table-container">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>질문 내용</th>
                            <th style="text-align: right;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="testTableBody">
                        </tbody>
                </table>
            </div>
            <div style="position: absolute; bottom: 35px; left: 35px; right: 35px;">
                <button type="button" class="btn btn-success w-100 py-3" style="border-radius: 12px; font-weight: bold; background-color: #38b2ac; border: none;">
                    + 새로운 문제 작성하기
                </button>
            </div>
        </div>

        <div id="rightView" class="view-card">
            <form id="rightForm">
                <span class="step-badge step2-badge">Step 2</span>
                <div class="view-title">문제 정보 입력</div>

                <div class="form-group">
                    <label class="form-label">질문 내용 (Question)</label>
                    <input type="text" placeholder="문제 내용을 추가해주세요" name="content" id="question" class="input-custom content">
                </div>

                <div class="form-group">
                    <label class="form-label">보기 입력 & 정답 선택 <span style="font-weight: normal; font-size: 0.8rem; color: #a0aec0; margin-left: 10px;">우측 라디오 버튼을 눌러 정답을 체크하세요.</span></label>
                    
                    <div class="option-row">
                        <span class="option-label">A</span>
                        <input type="text" name="opt1" id="opt1" placeholder="보기 1 입력" class="option-input">
                        <input type="radio" name="ans" value="1" class="radio-custom">
                    </div>
                    <div class="option-row">
                        <span class="option-label">B</span>
                        <input type="text" name="opt2" id="opt2" placeholder="보기 2 입력" class="option-input">
                        <input type="radio" name="ans" value="2" class="radio-custom">
                    </div>
                    <div class="option-row">
                        <span class="option-label">C</span>
                        <input type="text" name="opt3" id="opt3" placeholder="보기 3 입력" class="option-input">
                        <input type="radio" name="ans" value="3" class="radio-custom">
                    </div>
                    <div class="option-row">
                        <span class="option-label">D</span>
                        <input type="text" name="opt4" id="opt4" placeholder="보기 4 입력" class="option-input">
                        <input type="radio" name="ans" value="4" class="radio-custom">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">오답 해설 (Explanation)</label>
                    <textarea rows="4" placeholder="해설 부분을 추가해주세요" name="exp" id="exp" class="input-custom" style="resize: none; background-color: #fffaf0; border-color: #fefcbf;"></textarea>
                </div>

                <div class="action-area">
                    <input type="button" id="createTest" value="+ 문제 리스트에 추가" class="btn-main"> 
                    <input type="button" id="btnUpdate" value="수정 완료하기" class="btn-main btnUpdate" style="display: none;"> 
                    <button type="button" id="btnCancel" class="btn btn-link w-100 mt-2 text-decoration-none text-secondary" style="display: none;">작성 취소</button>
                </div>
				<div class="step2-footer-close">
				    <button type="button" id="btnPageClose" class="btn-close-custom">닫기</button>
				</div>
                <input type="hidden" id="qid" name="qid">
                <input type="hidden" id="id" name="id">
                <div class="dev-info">
                    ID INFO | 
                    강사: <input type="text" name="instId" id="instId" th:value="${instId}" readonly>
                    강의: <input type="text" name="lectId" id="lectId" th:value="${param.lectId}" readonly>
                </div>
            </form>
        </div>
    </div>
    <div id = "footer">
<th:block th:replace = "~{fragments/footer :: footer}"/>
</div>
</body>
</html>
